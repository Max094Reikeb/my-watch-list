apiVersion: apps/v1
kind: Deployment
metadata:
  name: watchlist
  labels:
    app: watchlist
spec:
  replicas: 2
  selector:
    matchLabels:
      app: watchlist
  template:
    metadata:
      labels:
        app: watchlist
    spec:
      containers:
        - name: watchlist
          image: reikeb/watchlist:postgresql-v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_HOST
              value: postgresql-service
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: watchlist
            - name: POSTGRES_USER
              value: watchlist
            - name: POSTGRES_PASSWORD
              value: watchlistpwd