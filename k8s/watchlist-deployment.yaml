apiVersion: apps/v1
kind: Deployment
metadata:
  name: watchlist
  labels:
    app: watchlist
spec:
  replicas: 2
  selector:
    matchLabels:
      app: watchlist
  template:
    metadata:
      labels:
        app: watchlist
    spec:
      containers:
        - name: watchlist
          image: reikeb/watchlist:sqlite-v3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000