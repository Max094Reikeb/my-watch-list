apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  labels:
    app: postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: watchlist
            - name: POSTGRES_USER
              value: watchlist
            - name: POSTGRES_PASSWORD
              value: watchlistpwd
            - name: POSTGRES_HOST
              value: postgresql-service
            - name: POSTGRES_PORT
              value: "5432"